<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VendorHub Enterprise v12.92</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.3.4/vue.global.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    @keyframes slide-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    @keyframes scale-up { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    .animate-scale-up { animation: scale-up 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    .animate-shake { animation: shake 0.3s ease-in-out; }
    @keyframes slideRight { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }
    .animate-progress { animation: slideRight 1s infinite linear; }
    [v-cloak] { display: none !important; } 
  </style>
</head>
<body class="bg-slate-50/50 font-sans text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">
  
  <script>
    window.addEventListener('error', function(event) {
      var appDiv = document.getElementById('app');
      if(appDiv) appDiv.style.display = 'none'; 
      var errDiv = document.createElement('div');
      errDiv.innerHTML = '<div style="padding:20px; background:#fee2e2; color:#991b1b; font-family:sans-serif; border:1px solid #f87171; border-radius:8px; margin:20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index:9999; position:relative;">' +
        '<h3 style="margin-top:0; font-size:18px;">⚠️ Aplikasi Error (Fatal Error)</h3>' +
        '<p><strong>Pesan Error:</strong> ' + event.message + '</p>' +
        '<p style="font-size:14px; margin-top:15px;"><strong>Saran:</strong> Refresh (F5) halaman ini.</p>' +
        '</div>';
      document.body.appendChild(errDiv);
    });
  </script>

  <div id="app" v-cloak class="flex h-screen overflow-hidden relative">
    
    <!-- ================= CUSTOM CONFIRM DIALOG ================= -->
    <div v-if="confirmDialog.isOpen" class="fixed inset-0 z-[1000] flex items-center justify-center p-4 sm:p-6">
      <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity animate-fade-in" @click="closeConfirm"></div>
      <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm flex flex-col animate-scale-up overflow-hidden border border-slate-100 p-8 text-center">
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full mb-5 shadow-inner"
             :class="confirmDialog.type === 'danger' ? 'bg-rose-50 text-rose-500 shadow-rose-100' : confirmDialog.type === 'info' ? 'bg-indigo-50 text-indigo-500 shadow-indigo-100' : 'bg-amber-50 text-amber-500 shadow-amber-100'">
          <i :class="['ph-fill text-4xl', confirmDialog.type === 'danger' ? 'ph-trash' : confirmDialog.type === 'info' ? 'ph-info' : 'ph-warning']"></i>
        </div>
        <h3 class="text-2xl font-black text-slate-800 mb-2 tracking-tight">{{ confirmDialog.title }}</h3>
        <p class="text-sm font-medium text-slate-500 mb-8 leading-relaxed">{{ confirmDialog.message }}</p>
        <div class="flex gap-3 w-full">
          <button @click="closeConfirm" class="flex-1 px-4 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">
            {{ confirmDialog.cancelText }}
          </button>
          <button @click="executeConfirm" class="flex-1 px-4 py-3.5 rounded-xl font-bold text-white transition-all shadow-lg flex justify-center items-center gap-2"
                  :class="confirmDialog.type === 'danger' ? 'bg-rose-600 hover:bg-rose-700 shadow-rose-600/30' : confirmDialog.type === 'info' ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/30' : 'bg-amber-500 hover:bg-amber-600 shadow-amber-500/30'">
            {{ confirmDialog.confirmText }}
          </button>
        </div>
      </div>
    </div>

    <!-- ================= MODAL BULK UPDATE STATUS ================= -->
    <div v-if="isBulkStatusModalOpen" class="fixed inset-0 z-[1050] flex items-center justify-center p-4 sm:p-6">
      <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity animate-fade-in" @click="closeBulkStatusModal"></div>
      <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm flex flex-col animate-scale-up overflow-hidden border border-slate-100 p-8 text-center">
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full mb-5 shadow-inner bg-indigo-50 text-indigo-500 shadow-indigo-100">
          <i class="ph-fill ph-tag text-4xl"></i>
        </div>
        <h3 class="text-2xl font-black text-slate-800 mb-2 tracking-tight">Ubah Status Massal</h3>
        <p class="text-sm font-medium text-slate-500 mb-6 leading-relaxed">Pilih status baru yang akan diterapkan pada <strong>{{ selectedRows.size }} vendor</strong> terpilih.</p>
        <select v-model="bulkStatusValue" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-indigo-500 outline-none shadow-sm cursor-pointer mb-8 text-slate-700">
          <option value="Aktif">Aktif</option>
          <option value="Non-Aktif">Non-Aktif</option>
          <option value="Blacklist">Blacklist</option>
        </select>
        <div class="flex gap-3 w-full">
          <button @click="closeBulkStatusModal" class="flex-1 px-4 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 transition-colors">Batal</button>
          <button @click="handleBulkUpdateStatus" class="flex-1 px-4 py-3.5 rounded-xl font-bold text-white transition-all shadow-lg flex justify-center items-center gap-2 bg-indigo-600 hover:bg-indigo-700 shadow-indigo-600/30">Update Status</button>
        </div>
      </div>
    </div>

    <!-- ================= LOADING OVERLAY ================= -->
    <div v-if="loading && !isImporting && !isSilentSync" class="fixed inset-0 z-[999] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm animate-fade-in">
      <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4 min-w-[300px] border border-slate-100">
        <i class="ph-bold ph-spinner-gap text-5xl text-indigo-600 animate-spin"></i>
        <div class="text-center">
          <h3 class="text-lg font-bold text-slate-800">Sedang Memproses...</h3>
          <p class="text-sm font-medium text-slate-500 mt-1">{{ loadingText || 'Menunggu respon server...' }}</p>
        </div>
      </div>
    </div>

    <!-- ================= LOGIN SCREEN ================= -->
    <div v-if="!isLoggedIn" class="min-h-screen w-full bg-slate-50 flex items-center justify-center p-4 relative overflow-hidden z-[100] fixed inset-0">
      <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-indigo-500/10 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-[100px]"></div>
      </div>
      
      <div class="bg-white p-8 rounded-3xl shadow-[0_20px_50px_-12px_rgba(0,0,0,0.1)] w-full max-w-md border border-slate-100 relative z-10 animate-slide-up">
        <div class="text-center mb-8">
          <div class="w-16 h-16 bg-gradient-to-br from-indigo-500 to-blue-600 rounded-2xl mx-auto flex items-center justify-center mb-4 shadow-lg shadow-indigo-200">
            <i class="ph-fill ph-buildings text-white text-3xl"></i>
          </div>
          <h1 class="text-2xl font-black text-slate-800 tracking-tight">VendorHub Enterprise</h1>
          <p class="text-slate-500 text-sm mt-2">Sistem Google Apps Script</p>
        </div>

        <div v-if="loginError" class="mb-6 p-3 bg-rose-50 border border-rose-100 rounded-xl text-rose-600 text-sm flex items-center gap-2 animate-shake">
          <i class="ph-fill ph-warning-circle text-lg"></i> {{ loginError }}
        </div>

        <form @submit.prevent="handleLogin" class="space-y-5">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Username</label>
            <div class="relative">
              <i class="ph ph-user absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
              <input type="text" v-model="loginForm.username" required class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all outline-none" placeholder="Masukkan admin" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
            <div class="relative">
              <i class="ph ph-lock-key absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
              <input type="password" v-model="loginForm.password" required class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white transition-all outline-none" placeholder="••••••••" />
            </div>
          </div>
          <button type="submit" :disabled="loginLoading" class="w-full bg-slate-900 hover:bg-indigo-600 disabled:opacity-60 text-white font-semibold py-3.5 rounded-xl transition-all shadow-md hover:shadow-xl mt-4 flex justify-center items-center gap-2">
            <i v-if="loginLoading" class="ph-bold ph-circle-notch animate-spin"></i> {{ loginLoading ? 'Memeriksa...' : 'Masuk ke Sistem' }}
          </button>
        </form>
      </div>
    </div>

    <!-- ================= MAIN LAYOUT ================= -->
    <template v-else>
      <!-- SIDEBAR -->
      <aside class="w-[260px] bg-slate-900 text-slate-300 flex-shrink-0 hidden lg:flex flex-col z-20 transition-all duration-300 relative">
        <div class="absolute inset-0 bg-gradient-to-b from-slate-900 via-slate-900 to-indigo-950 pointer-events-none"></div>
        <div class="p-6 relative z-10">
          <div class="flex items-center gap-3 text-white mb-2">
            <div class="p-2 bg-indigo-500 rounded-lg shadow-lg shadow-indigo-500/30"><i class="ph-fill ph-buildings text-2xl"></i></div>
            <h1 class="font-bold text-xl tracking-wide">VendorHub</h1>
          </div>
          <div class="flex items-center gap-2 text-xs text-indigo-300/80 px-1 font-medium bg-white/5 w-max py-1 rounded-full border border-white/10 mt-4 relative overflow-hidden group">
            <span v-if="isSyncing || isImporting" class="w-2 h-2 rounded-full bg-amber-400 shadow-[0_0_8px_rgba(251,191,36,0.8)] animate-pulse"></span>
            <span v-else-if="selectedRows.size > 0 || isModalOpen || isBulkStatusModalOpen" class="w-2 h-2 rounded-full bg-rose-400 shadow-[0_0_8px_rgba(244,63,94,0.8)]"></span>
            <span v-else class="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.8)]"></span>
            {{ (isSyncing || isImporting) ? 'Menyinkronkan...' : (selectedRows.size > 0 || isModalOpen || isBulkStatusModalOpen) ? 'Sync Dijeda' : 'Real-Time Sync' }}
            <div class="absolute inset-0 bg-white/10 translate-x-[-100%] group-hover:animate-[slideRight_1.5s_infinite]"></div>
          </div>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-1.5 relative z-10 overflow-y-auto custom-scrollbar">
          <button v-if="hasMenuAccess('dashboard')" @click="activeTab = 'dashboard'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'dashboard' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-squares-four text-xl" :class="activeTab === 'dashboard' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Dashboard
          </button>
          <button v-if="hasMenuAccess('vendors')" @click="activeTab = 'vendors'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'vendors' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-database text-xl" :class="activeTab === 'vendors' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Data Vendor
          </button>
          <button v-if="hasMenuAccess('dokumen')" @click="activeTab = 'dokumen'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'dokumen' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-shield-check text-xl" :class="activeTab === 'dokumen' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Dokumen Legal
          </button>
          <button v-if="hasMenuAccess('broadcast')" @click="activeTab = 'broadcast'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'broadcast' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-megaphone text-xl" :class="activeTab === 'broadcast' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Broadcast
          </button>
          <button v-if="hasMenuAccess('import')" @click="activeTab = 'import'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'import' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-arrows-down-up text-xl" :class="activeTab === 'import' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Import & Export
          </button>
          <button v-if="hasMenuAccess('logs')" @click="activeTab = 'logs'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'logs' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-activity text-xl" :class="activeTab === 'logs' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Log Aktivitas
          </button>
          <button v-if="hasMenuAccess('reminder')" @click="activeTab = 'reminder'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'reminder' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-bell-ringing text-xl" :class="activeTab === 'reminder' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Reminder Email
          </button>
          <button v-if="hasMenuAccess('pengaturan')" @click="activeTab = 'pengaturan'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'pengaturan' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-gear text-xl" :class="activeTab === 'pengaturan' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Pengaturan Sistem
          </button>
          <button v-if="hasMenuAccess('akses')" @click="activeTab = 'akses'" :class="['w-full flex items-center gap-3 px-4 py-3.5 rounded-xl font-medium transition-all duration-200 group', activeTab === 'akses' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-400 hover:bg-white/5 hover:text-white']">
            <i class="ph ph-users-three text-xl" :class="activeTab === 'akses' ? 'text-indigo-100' : 'group-hover:text-indigo-400'"></i> Manajemen Akses
          </button>
        </nav>
        
        <div class="p-4 relative z-10 mt-auto">
          <div class="bg-white/5 rounded-xl p-4 border border-white/10 backdrop-blur-sm">
            <div class="flex items-center gap-3 mb-3">
              <div class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold border-2 border-slate-800">{{ (currentUser?.username || 'AD').slice(0,2).toUpperCase() }}</div>
              <div class="text-left">
                <p class="text-sm font-semibold text-white leading-tight">{{ currentUser?.username || 'Administrator' }}</p>
                <p class="text-xs text-slate-400">{{ currentUser?.roleName || 'Purchasing Dept.' }}</p>
              </div>
            </div>
            <button @click="handleLogout" class="w-full flex items-center justify-center gap-2 py-2 text-sm text-rose-400 hover:text-white hover:bg-rose-500/20 rounded-lg transition-colors">
              <i class="ph ph-sign-out"></i> Keluar
            </button>
          </div>
        </div>
      </aside>

      <!-- MAIN CONTENT AREA -->
      <main class="flex-1 flex flex-col min-w-0 bg-slate-50 relative h-full">

        <header class="h-[72px] bg-white border-b border-slate-200/80 flex items-center justify-between px-6 lg:px-10 z-10 shrink-0 sticky top-0 backdrop-blur-md bg-white/90">
          <div class="flex items-center gap-4 lg:gap-8 flex-1">
            <h2 class="text-xl font-bold text-slate-800 hidden md:block capitalize tracking-tight whitespace-nowrap">
              {{ activeTab === 'vendors' ? 'Manajemen Vendor' : activeTab === 'dokumen' ? 'Kepatuhan Dokumen Legal' : activeTab === 'logs' ? 'Log Aktivitas Sistem' : activeTab === 'pengaturan' ? 'Pengaturan Sistem' : activeTab === 'reminder' ? 'Reminder Email' : activeTab === 'akses' ? 'Manajemen Akses & Role' : activeTab }}
            </h2>
            
            <div class="relative group max-w-md w-full hidden sm:block">
              <i class="ph ph-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 text-lg transition-colors"></i>
              <input type="text" v-model="searchQuery" @input="() => {if(activeTab !== 'vendors' && activeTab !== 'dokumen') activeTab = 'vendors'; currentPage = 1; legalCurrentPage = 1;}" placeholder="Cari perusahaan, produk, kontak, status..." class="w-full bg-slate-100 hover:bg-slate-200/50 border border-transparent focus:border-indigo-200 focus:bg-white pl-10 pr-10 py-2.5 rounded-full text-sm outline-none transition-all shadow-sm focus:shadow-md focus:shadow-indigo-100/50" />
              <button v-if="searchQuery" @click="searchQuery = ''; currentPage = 1; legalCurrentPage = 1;" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-rose-500">
                <i class="ph-fill ph-x-circle text-lg"></i>
              </button>
            </div>
          </div>
          
          <div class="flex items-center gap-4 justify-end">
            <div v-if="selectedRows.size > 0 || isModalOpen || isBulkStatusModalOpen || isDocModalOpen" class="hidden sm:flex items-center gap-1.5 text-xs font-bold text-rose-500 bg-rose-50 border border-rose-100 px-3 py-1.5 rounded-full animate-fade-in" title="Auto-Sync dijeda saat mengelola data">
              <i class="ph-bold ph-pause-circle"></i> Sync Dijeda
            </div>
            <div v-else-if="isSyncing && isSilentSync" class="hidden sm:flex items-center gap-1.5 text-xs font-bold text-indigo-500 bg-indigo-50 border border-indigo-100 px-3 py-1.5 rounded-full animate-fade-in">
              <i class="ph-bold ph-arrows-clockwise animate-spin"></i> Auto-Sync
            </div>

            <button v-if="activeTab !== 'dokumen' && activeTab !== 'pengaturan' && activeTab !== 'akses' && hasMenuAccess('vendors', 'full')" @click="openModal()" class="bg-slate-900 hover:bg-indigo-600 text-white px-5 py-2.5 rounded-full text-sm font-semibold shadow-md transition-all flex items-center gap-2 whitespace-nowrap group">
              <i class="ph ph-plus text-lg group-hover:rotate-90 transition-transform"></i> Tambah Vendor
            </button>
          </div>
        </header>

        <div class="flex-1 overflow-auto custom-scrollbar p-6 lg:p-10 relative">
          
          <!-- TAB: DASHBOARD -->
          <div v-if="activeTab === 'dashboard'" class="max-w-7xl mx-auto space-y-8 animate-fade-in pb-10">
            <div>
              <h1 class="text-3xl font-black text-slate-800 tracking-tight">Overview Status</h1>
              <p class="text-slate-500 mt-1 font-medium">Ringkasan kondisi data vendor terdaftar saat ini.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
              <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group">
                <div class="flex items-start justify-between">
                  <div><p class="text-slate-500 text-sm font-semibold mb-1">Total Vendor</p><h3 class="text-3xl font-black text-slate-800 tracking-tight group-hover:text-indigo-600">{{ stats.total }}</h3></div>
                  <div class="p-3 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 text-white shadow-lg"><i class="ph-fill ph-buildings text-2xl"></i></div>
                </div>
              </div>
              <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group">
                <div class="flex items-start justify-between">
                  <div><p class="text-slate-500 text-sm font-semibold mb-1">Status Aktif</p><h3 class="text-3xl font-black text-slate-800 tracking-tight group-hover:text-indigo-600">{{ stats.active }}</h3></div>
                  <div class="p-3 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-500 text-white shadow-lg"><i class="ph-fill ph-check-circle text-2xl"></i></div>
                </div>
              </div>
              <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group">
                <div class="flex items-start justify-between">
                  <div><p class="text-slate-500 text-sm font-semibold mb-1">Status Non-Aktif</p><h3 class="text-3xl font-black text-slate-800 tracking-tight group-hover:text-indigo-600">{{ stats.nonaktif }}</h3></div>
                  <div class="p-3 rounded-xl bg-gradient-to-br from-amber-400 to-orange-500 text-white shadow-lg"><i class="ph-fill ph-warning text-2xl"></i></div>
                </div>
              </div>

                          <div :class="['h-2 rounded-full transition-all', getComplianceScore(selectedDocVendor) >= 50 ? 'bg-emerald-500' : 'bg-amber-500']" :style="{ width: getComplianceScore(selectedDocVendor) + '%' }"></div>
                        </div>
                        <span :class="['font-black text-sm', getComplianceScore(selectedDocVendor) >= 50 ? 'text-emerald-600' : 'text-amber-600']">{{ getComplianceScore(selectedDocVendor) }}%</span>

                     <div v-if="getDocStatus(selectedDocVendor, doc.key) !== 'TIDAK ADA' && getDocStatus(selectedDocVendor, doc.key) !== ''" class="absolute -right-6 top-3 bg-emerald-500 text-white text-[8px] font-black py-0.5 px-6 rotate-45 shadow-sm">OK</div>

                         <span v-html="renderDocBadgeHTML(selectedDocVendor, doc.key)"></span>
                         
                         <a v-if="getDocLink(selectedDocVendor, doc.key) && getDocLink(selectedDocVendor, doc.key).startsWith('http')" :href="getDocLink(selectedDocVendor, doc.key)" target="_blank" rel="noreferrer" class="text-indigo-600 bg-indigo-50 hover:bg-indigo-600 hover:text-white px-2 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors text-xs font-bold shadow-sm" title="Buka File Dokumen">
                             Buka <i class="ph-bold ph-arrow-square-out"></i>
                         </a>
                     </div>
                  </div>
               </div>
             </div>
          </div>
        </div>
      </div>

      <!-- TOAST PROGRESS IMPORT -->
      <div v-if="isImporting" class="fixed bottom-6 left-6 bg-indigo-600 text-white px-5 py-4 rounded-xl shadow-2xl flex flex-col gap-2 z-[100] animate-slide-up border border-indigo-500 min-w-[300px]">
        <div class="flex justify-between items-center w-full">
            <div class="flex items-center gap-2">
                <i class="ph-bold ph-spinner-gap animate-spin text-lg"></i>
                <span class="font-bold text-sm tracking-wide">Menyinkronkan Data...</span>
            </div>
            <span class="text-xs font-bold bg-indigo-500 px-2 py-0.5 rounded">{{ importProgress }} / {{ importTotal }}</span>
        </div>
        <div class="w-full bg-indigo-800 rounded-full h-1.5 mt-1 overflow-hidden">
          <div class="bg-white h-1.5 rounded-full transition-all duration-300" :style="{ width: `${(importProgress / importTotal) * 100}%` }"></div>
        </div>
      </div>

      <!-- TOAST NOTIFICATION STANDAR -->
      <div v-if="toast" :class="['fixed bottom-6 right-6 text-white px-5 py-3.5 rounded-xl shadow-2xl flex items-center gap-3 z-[100] animate-slide-up border border-white/20 backdrop-blur-md', toast.type === 'error' ? 'bg-rose-500' : toast.type === 'info' ? 'bg-indigo-500' : toast.type === 'warning' ? 'bg-amber-500' : 'bg-emerald-500']">
        <i :class="toast.type === 'error' ? 'ph-fill ph-warning-circle' : toast.type === 'info' ? 'ph-fill ph-info' : toast.type === 'warning' ? 'ph-fill ph-warning' : 'ph-fill ph-check-circle'" class="text-xl"></i>
        <span class="font-medium text-sm tracking-wide">{{ toast.message }}</span>
        <button @click="toast = null" class="ml-4 hover:bg-white/20 rounded-full p-1"><i class="ph-bold ph-x"></i></button>
      </div>

    </template>
  </div>

  <script>
    if (typeof Vue === 'undefined') {
      throw new Error("Library Vue.js diblokir oleh browser. Pastikan koneksi stabil atau matikan AdBlocker.");
    }

    const { createApp, ref, computed, onMounted, watch } = Vue;

    // --- Helpers Utilitas Globals ---
    function isResigned(ket) { return /resign/i.test(String(ket || '')); }
    function isBlacklisted(status) { return String(status || '').toLowerCase() === 'blacklist'; }
    function isPO(ket) { return /\b(email po|po|e-mail|e-mail po)\b/i.test(String(ket || '')); }
    function canContact(v) { return v.status === 'Aktif' && !isResigned(v.keterangan); }
    
    function displayKeterangan(ket, status) {
      if (!ket || ket === '-') return '';
      let str = String(ket).trim();
      if (status !== 'Aktif') {
         str = str.replace(/\b(email\s*po|e-mail\s*po|e-mail|po)\b/gi, '').trim();
         str = str.replace(/^[,.\-\s]+|[,.\-\s]+$/g, '');
      }
      const lower = str.toLowerCase();
      if (['po', 'email po', 'e-mail', 'e-mail po', 'email po.', 'po.'].includes(lower)) return '';
      return str;
    }

    function getRowClass(v, isSelected) {
      if (isSelected) return 'bg-indigo-50/50';
      if (v.status !== 'Aktif' || isResigned(v.keterangan)) return 'bg-rose-50/60 hover:bg-rose-100/60';
      if (isPO(v.keterangan) && v.status === 'Aktif') return 'bg-emerald-50/60 hover:bg-emerald-100/60';
      return 'hover:bg-slate-50/80 bg-white';
    }

    function getBadgeColor(leg) {
      const type = String(leg || '').toUpperCase();
      if (type.includes('PT')) return 'bg-blue-100 text-blue-800 border-blue-200';
      if (type.includes('CV')) return 'bg-emerald-100 text-emerald-800 border-emerald-200';
      if (type.includes('UD')) return 'bg-amber-100 text-amber-800 border-amber-200';
      return 'bg-slate-100 text-slate-600 border-slate-200';
    }

    function formatWhatsAppLink(phone) {
      if (!phone || phone === '-') return null;
      let clean = String(phone).replace(/[^0-9]/g, '');
      if (clean.startsWith('0')) clean = '62' + clean.substring(1);
      return clean.length > 8 ? "https://wa.me/" + clean : null;
    }

    function cleanCompanyName(name) {
      if (!name) return '';
      let cleaned = String(name).toLowerCase();
      cleaned = cleaned.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g, " ");
      cleaned = cleaned.replace(/\b(pt|cv|ud|firma|tbk|ltd|inc|persero)\b/gi, " ");
      return cleaned.replace(/\s+/g, ' ').trim();
    }

    function guessSapaan(name) {
      if (!name || name === '-') return 'Bpk/Ibu';
      let coreName = name.toLowerCase().replace(/^(bapak|ibu|bpk|sdr|sdri)\s+/i, '').trim();
      if (!coreName) return 'Bpk/Ibu';
      const firstWord = coreName.split(' ')[0];
      const femaleNames = ['nadya', 'putri', 'nisa', 'sari', 'dewi', 'ayu', 'sri', 'lestari', 'dwi', 'wati', 'indah', 'ratna', 'siti', 'eka', 'tita', 'fannie', 'laily', 'dhita', 'amelia', 'rini', 'yanti', 'susanti', 'dina', 'fitri', 'novi', 'dian', 'maya', 'arini', 'karunia', 'citra', 'sesilia', 'wery'];
      const maleNames = ['putra', 'budi', 'joko', 'ahmad', 'muhammad', 'agus', 'iwan', 'hendra', 'wawan', 'yudi', 'ari', 'arif', 'eko', 'andi', 'dicky', 'hendri', 'angga', 'kiki', 'ryan', 'irfan', 'yunanta', 'giza', 'carlo', 'waryanto', 'miles', 'antoni', 'jatyo', 'aceng', 'charles', 'ade', 'hari', 'liusman', 'johan', 'elias'];
      if (femaleNames.includes(firstWord)) return 'Ibu';
      if (maleNames.includes(firstWord)) return 'Bpk';
      const lastChar = firstWord.slice(-1);
      if (['a', 'i', 'y'].includes(lastChar)) return 'Ibu';
      if (['o', 'u', 'e', 'd', 'r', 'n', 'l', 'm', 's', 't', 'b', 'c', 'g', 'h', 'k', 'p', 'w'].includes(lastChar)) return 'Bpk';
      return 'Bpk/Ibu';
    }

    function formatIndonesianPhone(phone) {
      if (!phone || String(phone) === '-' || String(phone).toUpperCase() === 'TIDAK ADA') return '-';
      let str = String(phone).trim();
      let numbers = str.split(/[\/,;]/);
      let formattedNumbers = numbers.map(num => {
         let n = String(num).trim().replace(/[\s\-\(\)\.]/g, ''); 
         if (n.startsWith('+62')) n = '0' + n.substring(3);
         else if (n.startsWith('62') && n.length >= 10) n = '0' + n.substring(2);
         else if (n.startsWith('+')) n = '0' + n.substring(1);
         if (n.startsWith('=') || n.startsWith('-')) n = n.substring(1);
         return n;
      }).filter(n => n.length > 0);
      if (formattedNumbers.length === 0) return '-';
      return formattedNumbers.join(' / ');
    }

    const getDocStatus = (vendor, docKey) => {
        if (!vendor || !vendor.documents) return 'TIDAK ADA';
        try {
            let docs = typeof vendor.documents === 'string' ? JSON.parse(vendor.documents) : vendor.documents;
            if (!docs[docKey] || !docs[docKey].status) return 'TIDAK ADA';
            return docs[docKey].status;
        } catch(e) { return 'TIDAK ADA'; }
    };

    const getDocLink = (vendor, docKey) => {
        if (!vendor || !vendor.documents) return '';
        try {
            let docs = typeof vendor.documents === 'string' ? JSON.parse(vendor.documents) : vendor.documents;
            if (!docs[docKey] || !docs[docKey].link) return '';
            return docs[docKey].link;
        } catch(e) { return ''; }
    };

    const renderDocBadgeHTML = (vendor, docKey) => {
        const isTextField = ['merk', 'negara', 'ruangKan', 'sppkpStatus'].includes(docKey);
        const status = getDocStatus(vendor, docKey);
        
        if (!status || status === 'TIDAK ADA' || status === '' || status === '-') {
            return `<span class="px-2.5 py-1 bg-slate-100 text-slate-500 rounded-md text-[10px] font-bold border border-slate-200">TIDAK ADA</span>`;
        }
        
        if (isTextField) {
             return `<span class="px-2.5 py-1 bg-blue-50 text-blue-700 rounded-md text-[11px] font-semibold border border-blue-200 block truncate w-full max-w-[180px] mx-auto text-left" title="${status}">${status}</span>`;
        }

        if (['ADA', 'YA', 'YES'].includes(status.toUpperCase()) || status.toUpperCase().includes('TERSEDIA')) {
            return `<span class="px-2.5 py-1 bg-emerald-100 text-emerald-700 rounded-md text-[10px] font-bold border border-emerald-200">TERSEDIA</span>`;
        }
        
        if (['SPPKP', 'NON PKP'].includes(status.toUpperCase())) {
            return `<span class="px-2.5 py-1 bg-emerald-100 text-emerald-700 rounded-md text-[10px] font-bold border border-emerald-200">${status.toUpperCase()}</span>`;
        }

        return `<span class="px-2.5 py-1 bg-indigo-100 text-indigo-700 rounded-md text-[10px] font-bold border border-indigo-200">${status}</span>`;
    };

    const getAuthStorage = () => {
      try {
        const raw = localStorage.getItem('gas_vendorhub_user');
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    };

    const setAuthStorage = (userObj) => {
      try {
        if (userObj) localStorage.setItem('gas_vendorhub_user', JSON.stringify(userObj));
        else localStorage.removeItem('gas_vendorhub_user');
      } catch (e) {
        console.warn("localStorage diblokir oleh browser, sesi tidak dapat disimpan.");
      }
    };

    // ⚠️ Isi dengan URL Web App Apps Script Anda (Deploy → Manage deployments → salin URL /exec).
    // Cuma dipakai kalau index.html ini dibuka DI LUAR Apps Script (misalnya di Vercel).
    const APPS_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbypJsCj3lc3yvIHhwjIwx2fYfRjR60ApqjwvcIL6HjYCGeVNLaKinzaxBaTdJ4tCMAr/exec";
    // ⚠️ Harus SAMA PERSIS dengan CONFIG.API_SECRET di Code.gs Anda.
    const API_SECRET = "vendorhub-kmi";

    const runGas = (func, ...args) => {
      return new Promise((resolve, reject) => {
        // Mode 1: dijalankan langsung di dalam Apps Script (HtmlService) — dipertahankan
        // supaya /dev dan /exec bawaan Apps Script tetap berfungsi seperti biasa untuk testing.
        if (typeof google !== 'undefined' && typeof google.script !== 'undefined') {
          const timeoutId = setTimeout(() => {
              reject(new Error("Koneksi ke Google Server terputus (Timeout). Silakan coba lagi."));
          }, 30000);

          google.script.run
            .withSuccessHandler(res => {
                clearTimeout(timeoutId);
                try {
                    if (res && res.success) resolve(res.data);
                    else reject((res && res.error) ? res.error : 'Server mengembalikan response tidak valid.');
                } catch (innerErr) {
                    // PENTING: tanpa try/catch ini, error di baris atas akan membuat
                    // Promise menggantung SELAMANYA (timeout sudah terlanjur dibatalkan di atas)
                    reject(innerErr.message || 'Gagal memproses response dari server.');
                }
            })
            .withFailureHandler(err => {
                clearTimeout(timeoutId);
                reject(err.message || err);
            })
            [func](...args);
          return;
        }

        // Mode 2: dijalankan DI LUAR Apps Script (misalnya di-hosting di Vercel).
        // Tidak ada google.script.run di sini, jadi panggil Apps Script sebagai API lewat fetch().
        if (!APPS_SCRIPT_API_URL || APPS_SCRIPT_API_URL.indexOf("GANTI_DENGAN") === 0) {
          reject(new Error("APPS_SCRIPT_API_URL belum diisi di index.html. Isi dulu dengan URL /exec Apps Script Anda."));
          return;
        }

        const timeoutId = setTimeout(() => {
            reject(new Error("Koneksi ke server terputus (Timeout). Silakan coba lagi."));
        }, 30000);

        fetch(APPS_SCRIPT_API_URL, {
          method: 'POST',
          // PENTING: pakai text/plain (bukan application/json) supaya browser TIDAK mengirim
          // preflight OPTIONS request — Apps Script /exec tidak menangani preflight CORS
          // dengan benar, jadi request akan gagal kalau pakai Content-Type application/json.
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ secret: API_SECRET, fn: func, args })
        })
          .then(r => r.json())
          .then(res => {
              clearTimeout(timeoutId);
              try {
                  if (res && res.success) resolve(res.data);
                  else reject((res && res.error) ? res.error : 'Server mengembalikan response tidak valid.');
              } catch (innerErr) {
                  reject(innerErr.message || 'Gagal memproses response dari server.');
              }
          })
          .catch(err => {
              clearTimeout(timeoutId);
              reject(new Error('Gagal terhubung ke server Apps Script: ' + err.message));
          });
      });
    };

    createApp({
      setup() {
        const activeTab = ref('dashboard');
        const vendors = ref([]);
        const loading = ref(true);
        const loadingText = ref(''); 
        const isSilentSync = ref(false); 
        const isSyncing = ref(false); 
        const searchQuery = ref('');
        const isModalOpen = ref(false);
        const editingVendor = ref(null);
        const formData = ref({ alamat: '-' });
        const isSaving = ref(false);
        const selectedRows = ref(new Set());
        const currentPage = ref(1);
        const itemsPerPage = ref(15);
        const toast = ref(null);
        
        const importMode = ref('append'); 
        const fileInputRef = ref(null); 
        const isImporting = ref(false);
        const importProgress = ref(0);
        const importTotal = ref(0);
        
        const activeFilters = ref({ aktif: true, nonAktif: true, blacklist: true });
        const isFilterOpen = ref(false);
        const vendorLegalFilter = ref('ALL');
        
        const isDocModalOpen = ref(false);
        const selectedDocVendor = ref(null);
        
        const legalCurrentPage = ref(1);
        const legalItemsPerPage = ref(15);
        const legalDocFilter = ref('ALL');
        const legalSortConfig = ref({ key: 'perusahaan', direction: 'asc' });

        const broadcastInput = ref('');
        const broadcastResults = ref([]);
        const broadcastNotFound = ref([]);
        
        const logs = ref([]);
        let inactivityTimer = null;

        const showSuggestions = ref(false);
        const showEmailSuggestions = ref(false);

        const settings = ref({ formUrl: "", hideDuplicate: false, autoSyncDaily: false, showStatusUpdate: true, mappedColumns: { timestamp: "" } });

        // === REMINDER EMAIL (v12.94) ===
        const reminderSettings = ref({
          enabled: false, intervalDays: 7, preDueEnabled: false,
          senderName: "Tim Purchasing", ccEmail: "",
          subject: "Reminder: Update Data Legalitas Vendor - {{perusahaan}}",
          body: "Yth. Bapak/Ibu {{pic}},\n\nKami informasikan bahwa data legalitas perusahaan {{perusahaan}} yang terdaftar di sistem kami sudah tidak diperbarui sejak {{tanggal_update}} ({{hari_terlambat}} hari yang lalu).\n\nMohon kesediaannya untuk mengisi ulang formulir data vendor kami agar status legalitas perusahaan Anda tetap valid.\n\nTerima kasih atas kerja samanya.\n\nHormat kami,\nTim Purchasing"
        });
        const reminderOverview = ref({ overdueCount: 0, preDueCount: 0, overdueList: [], preDueList: [] });
        const isSendingReminder = ref(false);
        const isSendingSingleReminder = ref(null); // menyimpan id vendor yang sedang dikirimi reminder
        const formHeaders = ref([]);

        const expandedGroups = ref(new Set());

        watch(activeTab, (newTab) => {
          if (newTab === 'reminder') {
            loadReminderConfig();
            loadReminderOverview();
          }
        });

        const toggleExpand = (id) => {
            const newSet = new Set(expandedGroups.value);
            if (newSet.has(id)) newSet.delete(id);
            else newSet.add(id);
            expandedGroups.value = newSet;
        };

        const cachedDeduplicatedVendors = ref([]);

        const confirmDialog = ref({
          isOpen: false, title: '', message: '', type: 'danger', 
          confirmText: 'Ya', cancelText: 'Batal', onConfirm: null
        });

        const isBulkStatusModalOpen = ref(false);
        const bulkStatusValue = ref('Aktif');

        const storedUser = getAuthStorage();
        const isLoggedIn = ref(!!storedUser);
        const currentUser = ref(storedUser || null);
        const loginForm = ref({ username: '', password: '' });
        const loginError = ref('');
        const loginLoading = ref(false);

        // level minimum: 'view' (bisa lihat menu ini) atau 'full' (bisa tambah/edit/hapus/kirim/simpan)
        const hasMenuAccess = (menuKey, minLevel) => {
          minLevel = minLevel || 'view';
          if (!currentUser.value || !currentUser.value.permissions) return false;
          const lvl = currentUser.value.permissions[menuKey] || 'none';
          if (lvl === 'none') return false;
          if (minLevel === 'full') return lvl === 'full';
          return true;
        };

        const MENU_ORDER = ['dashboard', 'vendors', 'dokumen', 'broadcast', 'import', 'logs', 'reminder', 'pengaturan', 'akses'];
        const firstAccessibleMenu = () => MENU_ORDER.find(m => hasMenuAccess(m)) || 'dashboard';

        const docFields = ref([
          { key: 'companyProfile', label: 'Company Profile' },
          { key: 'aktaPendirian', label: 'Akta Pendirian' },
          { key: 'aktaPerubahan', label: 'Akta Perubahan Terupdate' },
          { key: 'nib', label: 'NIB OSS RBA & KBLI' },
          { key: 'npwp', label: 'NPWP 16 Digit' },
          { key: 'sppkpStatus', label: 'Status Perusahaan SPPKP / Non PKP' },
          { key: 'nonPkp', label: 'Surat Keterangan Non PKP' },
          { key: 'skt', label: 'Surat Keterangan Terdaftar (SKT)' },
          { key: 'merk', label: 'Merk/Brand (tulis dengan jelas)' },
          { key: 'distributor', label: 'Surat Penunjukan Distributor' },
          { key: 'negara', label: 'Negara Asal (produsen/pabrik pembuat)' },
          { key: 'iso9001', label: 'Sertifikat ISO 9001' },
          { key: 'iso45001', label: 'Sertifikat ISO 45001' },
          { key: 'iso14001', label: 'Sertifikat ISO 14001' },
          { key: 'iso22000', label: 'Sertifikat ISO 22000' },
          { key: 'fssc', label: 'Sertifikat FSSC' },
          { key: 'halal', label: 'Sertifikat Halal' },
          { key: 'smk3', label: 'SMK3 (Sistem Manajemen K3)' },
          { key: 'kan', label: 'Sertifikat KAN (ISO 17025)' },
          { key: 'ruangKan', label: 'Ruang Lingkup KAN (tulis dengan jelas)' },
          { key: 'instansi', label: 'Sertifikat Penunjukan Instansi Pemerintahan' },
          { key: 'sppkp', label: 'Dokumen SPPKP' }
        ]);

        const formatTimeAgo = (ts) => {
          if (!ts || ts === '-' || ts === 0 || ts === "") return '-';
          const seconds = Math.floor((new Date() - ts) / 1000);
          if (seconds < 0) return "Baru saja"; 
          let interval = seconds / 31536000;
          if (interval > 1) return Math.floor(interval) + " thn lalu";
          interval = seconds / 2592000;
          if (interval > 1) return Math.floor(interval) + " bln lalu";
          interval = seconds / 86400;
          if (interval > 1) return Math.floor(interval) + " hr lalu";
          interval = seconds / 3600;
          if (interval > 1) return Math.floor(interval) + " jam lalu";
          interval = seconds / 60;
          if (interval > 1) return Math.floor(interval) + " menit lalu";
          return Math.floor(seconds) + " dtk lalu";
        };

        const showToast = (message, type = 'success') => {
          toast.value = { message, type };
          setTimeout(() => toast.value = null, 4000);
        };

        const formatDateOnly = (timestamp) => {
          if (!timestamp || timestamp === '-' || timestamp === 0 || timestamp === "") return '-';
          const d = new Date(timestamp);
          if (isNaN(d.getTime())) return '-';
          const day = String(d.getDate()).padStart(2, '0');
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const year = d.getFullYear();
          return `${day}-${month}-${year}`;
        };

        const isUpdateValid = (timestamp) => {
          if (!timestamp || timestamp === '-' || timestamp === 0 || timestamp === "") return false;
          const d = new Date(timestamp);
          if (isNaN(d.getTime())) return false;
          const sixMonthsAgo = new Date();
          sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
          return d >= sixMonthsAgo;
        };

        const handleFetchFormHeaders = async () => {
          if(!settings.value.formUrl) return showToast("Masukkan URL Google Form/Spreadsheet terlebih dahulu", "warning");
          loading.value = true;
          loadingText.value = 'Membaca kolom form...';
          try {
            const res = await runGas('fetchExternalHeaders', settings.value.formUrl);
            formHeaders.value = res;
            showToast("Berhasil membaca kolom. Silakan pilih Kolom Tanggal.");
          } catch(e) { showToast(e, "error"); }
          loading.value = false;
        };

        const saveAppConfig = async () => {
          loading.value = true;
          try {
            await runGas('saveSettings', settings.value);
            showToast("Pengaturan disimpan!");
            addLog('PENGATURAN', `Memperbarui konfigurasi Integrasi & Deduplikasi`);
          } catch(e) { showToast(e, "error"); }
          loading.value = false;
        };

        const loadReminderOverview = async () => {
          try {
            const res = await runGas('getReminderOverview');
            if (res) reminderOverview.value = res;
          } catch(e) { console.error('Gagal memuat ringkasan reminder:', e); }
        };

        const loadReminderConfig = async () => {
          try {
            const res = await runGas('loadReminderSettings');
            if (res) reminderSettings.value = res;
          } catch(e) { console.error('Gagal memuat pengaturan reminder:', e); }
        };

        const saveReminderConfig = async () => {
          loading.value = true;
          try {
            await runGas('saveReminderSettings', reminderSettings.value);

            addLog('PENGATURAN', `Memperbarui konfigurasi Reminder Email`);
          } catch(e) { showToast(e, "error"); }
          loading.value = false;
        };

        const handleSendBulkReminder = async () => {
          if (reminderOverview.value.overdueCount === 0) {
            showToast("Tidak ada vendor yang perlu diingatkan saat ini.", "info");
            return;
          }
          isSendingReminder.value = true;
          try {
            const res = await runGas('sendBulkReminderNow');
            showToast(res.message || "Reminder terkirim!");

          } catch(e) { showToast(e, "error"); }
          isSendingReminder.value = false;
        };

        const handleSendSingleReminder = async (vendor) => {
          isSendingSingleReminder.value = vendor.id;
          try {
            const res = await runGas('sendReminderToVendor', vendor.id);
            showToast(res.message || `Reminder terkirim ke ${vendor.perusahaan}`);
            addLog('REMINDER', `Kirim reminder manual ke ${vendor.perusahaan}.`);
          } catch(e) { showToast(e, "error"); }
          isSendingSingleReminder.value = null;
        };

        const handleSyncFromForm = async () => {
          if (isImporting.value) {
             showToast("Proses sedang berjalan di latar belakang...", "warning");
             return;
          }
          isImporting.value = true;
          importProgress.value = 0;
          importTotal.value = 0;
          showToast("Sync Latar Belakang dimulai. Anda dapat melanjutkan pekerjaan.", "info");

          try {
            const rawData = await runGas('syncFromGoogleForm', settings.value.formUrl);
            if(rawData && rawData.length > 0) {
                let newImports = parseRowsToImports(rawData);
                await executeSmartMerge(newImports);
            } else {
                isImporting.value = false;
            }
          } catch(e) {
            showToast("Gagal Sync: " + e, "error");
            isImporting.value = false;
          }
        };

        const goToLegalDoc = (v) => {
          searchQuery.value = v.perusahaan;

        // =========== MANAJEMEN AKSES (ROLE & USER) ===========
        const MENU_LABELS = {
          dashboard: 'Dashboard', vendors: 'Data Vendor', dokumen: 'Dokumen Legal',
          broadcast: 'Broadcast', import: 'Import & Export', logs: 'Log Aktivitas',
          reminder: 'Reminder Email', pengaturan: 'Pengaturan Sistem', akses: 'Manajemen Akses'
        };
        const accessData = ref({ roles: [], users: [] });
        const expandedRole = ref(null);
        const isRoleFormOpen = ref(false);
        const roleForm = ref({ roleName: '', permissions: {} });
        const isUserFormOpen = ref(false);
        const userForm = ref({ id: '', username: '', password: '', roleName: '', active: true });

        const emptyPermissions = () => { const p = {}; MENU_ORDER.forEach(m => p[m] = 'none'); return p; };

        const loadAccessData = async () => {
          try {
            const res = await runGas('getUsersAndRoles');
            res.roles.forEach(r => { MENU_ORDER.forEach(m => { if (!r.permissions[m]) r.permissions[m] = 'none'; }); });
            accessData.value = res;
          } catch (e) { showToast("Gagal memuat data Manajemen Akses: " + e, "error"); }
        };

        const openRoleForm = () => {
          roleForm.value = { roleName: '', permissions: emptyPermissions() };
          isRoleFormOpen.value = true;
        };

        const saveRoleForm = async (existingRole) => {
          loading.value = true;
          try {
            const payload = existingRole
              ? { roleName: existingRole.roleName, oldRoleName: existingRole.roleName, permissions: existingRole.permissions }
              : { roleName: roleForm.value.roleName, oldRoleName: roleForm.value.roleName, permissions: roleForm.value.permissions };
            await runGas('saveRole', payload);
            showToast("Role berhasil disimpan!");
            addLog('PENGATURAN', `Menyimpan role akses: ${payload.roleName}`);
            isRoleFormOpen.value = false;
            await loadAccessData();
          } catch (e) { showToast(e, "error"); }
          loading.value = false;
        };

        const confirmDeleteRole = (roleName) => {
          openConfirm({
            title: 'Hapus Role',
            message: `Yakin ingin menghapus role "${roleName}"? User yang masih memakai role ini harus dipindah dulu ke role lain.`,
            confirmText: 'Ya, Hapus',

              try {
                await runGas('deleteRole', roleName);
                showToast("Role dihapus.");
                addLog('PENGATURAN', `Menghapus role akses: ${roleName}`);

          });

        const openUserForm = (user) => {
          userForm.value = user

            : { id: '', username: '', password: '', roleName: (accessData.value.roles[0] && accessData.value.roles[0].roleName) || '', active: true };

        const saveUserForm = async () => {
          loading.value = true;
          try {
            await runGas('saveUser', userForm.value);
            showToast("User berhasil disimpan!");
            addLog('PENGATURAN', `Menyimpan user: ${userForm.value.username}`);
            isUserFormOpen.value = false;
            await loadAccessData();
          } catch (e) { showToast(e, "error"); }
          loading.value = false;
        };

        const confirmDeleteUser = (user) => {
          openConfirm({
            title: 'Hapus User',
            message: `Yakin ingin menghapus user "${user.username}"?`,
            confirmText: 'Ya, Hapus',
            onConfirm: async () => {
              try {
                await runGas('deleteUser', user.id);
                showToast("User dihapus.");
                addLog('PENGATURAN', `Menghapus user: ${user.username}`);
                await loadAccessData();
              } catch (e) { showToast(e, "error"); }
            }
          });
        };

        watch(activeTab, (tab) => { if (tab === 'akses') loadAccessData(); });

        const duplicateEmailWarning = computed(() => {
           if (!formData.value.email || formData.value.email.length < 4 || formData.value.email === '-') return null;
           const checkEmail = formData.value.email.toLowerCase().trim();
           const found = vendors.value.find(v => v.id !== formData.value.id && v.email && v.email !== '-' && v.email.toLowerCase().includes(checkEmail));
           return found ? `Email ini sudah digunakan oleh ${found.pic} dari ${found.perusahaan}` : null;
        });

        const selectSuggestion = (item) => {
          const relatedVendors = vendors.value.filter(v => cleanCompanyName(v.perusahaan) === cleanCompanyName(item.perusahaan));
          let bestRef = relatedVendors.find(v => isPO(v.keterangan)) || relatedVendors[0]; 
          formData.value.perusahaan = bestRef.perusahaan; 
          let filledFields = [];
          if (bestRef.legalitas && bestRef.legalitas !== '-') { formData.value.legalitas = bestRef.legalitas; filledFields.push('Badan Usaha'); }
          if (bestRef.alamat && bestRef.alamat !== '-') { formData.value.alamat = bestRef.alamat; filledFields.push('Alamat'); }
          if (bestRef.produk && bestRef.produk !== '-') { formData.value.produk = bestRef.produk; filledFields.push('Produk/Jasa'); }
          if (filledFields.length > 0) showToast(`Autofill otomatis diterapkan untuk: ${filledFields.join(', ')}`, 'info');
          showSuggestions.value = false;
        };

        const selectEmailSuggestion = (item) => {
          formData.value.email = item.email;
          showEmailSuggestions.value = false;
        };

        const getComplianceScore = (vendor) => {
            if (!vendor || !vendor.documents) return 0;
            let docs = typeof vendor.documents === 'string' ? JSON.parse(vendor.documents) : vendor.documents;
            let total = docFields.value.length;
            let filled = 0;
            docFields.value.forEach(df => {
                let st = docs[df.key]?.status;
                if (st && st !== 'TIDAK ADA' && st !== '' && st !== '-') filled++;
            });
            return Math.round((filled / total) * 100);
        };

        const handleEnableAutoBackup = () => {
          openConfirm({
            title: 'Aktifkan Auto-Backup',
            message: 'Sistem akan otomatis menjadwalkan pencadangan ke Folder "Backup VendorHub" di Google Drive Anda setiap seminggu sekali tanpa perlu Anda klik apapun. Lanjutkan?',
            type: 'info',
            confirmText: 'Ya, Aktifkan Backup',
            cancelText: 'Batal',
            onConfirm: async () => {
              loading.value = true;
              loadingText.value = 'Menyiapkan sistem Cloud Backup...';
              try {
                await runGas('enableAutoBackup');
                showToast("Auto-Backup Mingguan berhasil diaktifkan!", "success");
                addLog('PENGATURAN', `Mengaktifkan fitur Auto-Backup Mingguan`);
              } catch (e) {
                showToast("Gagal mengaktifkan Auto-Backup", "error");
              }
              loading.value = false;
            }
          });
        };

        const isAllFiltersActive = computed(() => activeFilters.value.aktif && activeFilters.value.nonAktif && activeFilters.value.blacklist);
        
        const companySuggestions = computed(() => {
          if (!formData.value.perusahaan || formData.value.perusahaan.length < 2) return [];
          const search = formData.value.perusahaan.toLowerCase();
          const matches = vendors.value.filter(v => String(v.perusahaan).toLowerCase().includes(search));
          const unique = []; const seen = new Set();
          for (const v of matches) {
            const key = String(v.perusahaan).toLowerCase();
            if (!seen.has(key)) { seen.add(key); unique.push(v); }
          }
          return unique.slice(0, 5); 
        });

        const emailSuggestions = computed(() => {
          let matches = [];
          const currentCompany = String(formData.value.perusahaan || '').toLowerCase();
          const currentEmailInput = String(formData.value.email || '').toLowerCase();
          if (currentEmailInput.length > 0) matches = vendors.value.filter(v => v.email && v.email !== '-' && String(v.email).toLowerCase().includes(currentEmailInput));
          else if (currentCompany.length > 0) matches = vendors.value.filter(v => v.email && v.email !== '-' && String(v.perusahaan).toLowerCase() === currentCompany);
          else return [];
          const unique = []; const seen = new Set();
          for (const v of matches) {
            const key = String(v.email).toLowerCase().trim();
            if (!seen.has(key) && key !== '') { seen.add(key); unique.push({ email: v.email, perusahaan: v.perusahaan }); }
          }
          return unique.slice(0, 5);
        });

        const sortConfig = ref({ key: 'formTimestamp', direction: 'desc' });
        
        const calculateDeduplication = () => {
            let items = [...vendors.value];
            if (settings.value.hideDuplicate) {
                const uniqueMap = new Map();
                items.forEach(v => {
                    const compName = cleanCompanyName(v.perusahaan);
                    if(!compName) return;

                    if (!uniqueMap.has(compName)) {
                        uniqueMap.set(compName, { ...v, duplicates: [] });
                    } else {
                        let existing = uniqueMap.get(compName);
                        let currentV = { ...v, duplicates: [] };
                        
                        let dateExisting = existing.formTimestamp || 0;
                        let dateNew = currentV.formTimestamp || 0;
                        
                        let swap = false;
                        if (dateNew > dateExisting) swap = true;
                        else if (dateNew === dateExisting) {
                            let existScore = (existing.status === 'Aktif' ? 10 : 0) + (isPO(existing.keterangan) ? 5 : 0);
                            let newScore = (currentV.status === 'Aktif' ? 10 : 0) + (isPO(currentV.keterangan) ? 5 : 0);
                            if (newScore > existScore) swap = true;
                            else if (newScore === existScore) {
                                let existLen = (existing.email !== '-' ? 1 : 0) + (existing.hp !== '-' ? 1 : 0);
                                let newLen = (currentV.email !== '-' ? 1 : 0) + (currentV.hp !== '-' ? 1 : 0);
                                if (newLen > existLen) swap = true;
                            }
                        }

                        if (swap) {
                            currentV.duplicates = [...(existing.duplicates || [])];
                            let existingCopy = { ...existing };
                            delete existingCopy.duplicates; 
                            currentV.duplicates.push(existingCopy);
                            uniqueMap.set(compName, currentV);
                        } else {
                            let currentVCopy = { ...currentV };
                            delete currentVCopy.duplicates; 
                            if (!existing.duplicates) existing.duplicates = [];
                            existing.duplicates.push(currentVCopy);
                        }
                    }
                });
                cachedDeduplicatedVendors.value = Array.from(uniqueMap.values());
            } else {
                cachedDeduplicatedVendors.value = items.map(v => ({...v, duplicates: []}));
            }
        };

        watch([vendors, () => settings.value.hideDuplicate], () => {
            calculateDeduplication();
        }, { deep: true });

        const filteredVendors = computed(() => {
            const q = searchQuery.value.toLowerCase().trim();
            return cachedDeduplicatedVendors.value.filter(v => {
                const st = v.status || 'Aktif';
                if (st === 'Aktif' && !activeFilters.value.aktif) return false;
                if (st === 'Non-Aktif' && !activeFilters.value.nonAktif) return false;
                if (st === 'Blacklist' && !activeFilters.value.blacklist) return false;

                if (vendorLegalFilter.value === 'ADA' && !v.hasLegalData) return false;
                if (vendorLegalFilter.value === 'KOSONG' && v.hasLegalData) return false;

                if (!q) return true;
                return String(v.perusahaan||'').toLowerCase().includes(q) ||
                       String(v.produk||'').toLowerCase().includes(q) ||
                       String(v.pic||'').toLowerCase().includes(q) ||
                       String(v.email||'').toLowerCase().includes(q) ||
                       String(v.status||'Aktif').toLowerCase().includes(q);
            });
        });

        const sortedVendors = computed(() => {
            let items = [...filteredVendors.value];
            items.sort((a, b) => {
                let aVal = String(a[sortConfig.value.key] || '').toLowerCase();
                let bVal = String(b[sortConfig.value.key] || '').toLowerCase();
                if(sortConfig.value.key === 'formTimestamp') {
                    aVal = a.formTimestamp || 0; bVal = b.formTimestamp || 0;
                }
                if (aVal < bVal) return sortConfig.value.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortConfig.value.direction === 'asc' ? 1 : -1;
                return 0;
            });
            return items;
        });

        const totalPages = computed(() => Math.max(1, Math.ceil(sortedVendors.value.length / itemsPerPage.value)));
        const currentData = computed(() => sortedVendors.value.slice((currentPage.value - 1) * itemsPerPage.value, currentPage.value * itemsPerPage.value));

        const uniqueLegalVendors = computed(() => {
            const map = new Map();
            filteredVendors.value.forEach(v => {
                let parsedDocs = {};
                try { parsedDocs = typeof v.documents === 'string' ? JSON.parse(v.documents) : (v.documents || {}); } catch(e) {}
                if (!v.hasLegalData) return; 

                const compName = cleanCompanyName(v.perusahaan);
                if (!map.has(compName)) {
                    map.set(compName, { ...v, documents: parsedDocs });
                } else {
                    let existing = map.get(compName);
                    let mergedDocs = existing.documents;
                    for (let key in parsedDocs) {
                        if (!mergedDocs[key]) mergedDocs[key] = { status: 'TIDAK ADA', link: '' };
                        let st = parsedDocs[key].status;
                        let lnk = parsedDocs[key].link;
                        if (st && st !== 'TIDAK ADA' && st !== '') mergedDocs[key].status = st;
                        if (lnk && !mergedDocs[key].link) mergedDocs[key].link = lnk;
                    }
                }
            });
            
            let items = Array.from(map.values());
            if (legalDocFilter.value !== 'ALL') {
                items = items.filter(v => v.documents && v.documents[legalDocFilter.value] && v.documents[legalDocFilter.value].status !== 'TIDAK ADA' && v.documents[legalDocFilter.value].status);
            }
            
            items.sort((a, b) => {
                let aVal, bVal;
                if (legalSortConfig.value.key === 'perusahaan') {
                    aVal = String(a.perusahaan || '').toLowerCase();
                    bVal = String(b.perusahaan || '').toLowerCase();
                    if (aVal < bVal) return legalSortConfig.value.direction === 'asc' ? -1 : 1;
                    if (aVal > bVal) return legalSortConfig.value.direction === 'asc' ? 1 : -1;
                    return 0;
                } else if (legalSortConfig.value.key === 'score') {
                    aVal = getComplianceScore(a); bVal = getComplianceScore(b);
                    if (aVal < bVal) return legalSortConfig.value.direction === 'asc' ? -1 : 1;
                    if (aVal > bVal) return legalSortConfig.value.direction === 'asc' ? 1 : -1;
                    return 0;
                } else {
                    let docKey = legalSortConfig.value.key;
                    aVal = (a.documents && a.documents[docKey] && a.documents[docKey].status !== 'TIDAK ADA' && a.documents[docKey].status) ? 0 : 1;
                    bVal = (b.documents && b.documents[docKey] && b.documents[docKey].status !== 'TIDAK ADA' && b.documents[docKey].status) ? 0 : 1;
                    if (aVal < bVal) return legalSortConfig.value.direction === 'asc' ? -1 : 1;
                    if (aVal > bVal) return legalSortConfig.value.direction === 'asc' ? 1 : -1;
                    return String(a.perusahaan || '').localeCompare(String(b.perusahaan || ''));
                }
            });
            return items;
        });

        const legalTotalPages = computed(() => Math.max(1, Math.ceil(uniqueLegalVendors.value.length / legalItemsPerPage.value)));
        const currentLegalData = computed(() => uniqueLegalVendors.value.slice((legalCurrentPage.value - 1) * legalItemsPerPage.value, legalCurrentPage.value * legalItemsPerPage.value));

        const stats = computed(() => ({
          total: filteredVendors.value.length,
          active: filteredVendors.value.filter(v => (v.status || 'Aktif') === 'Aktif').length,
          nonaktif: filteredVendors.value.filter(v => v.status === 'Non-Aktif').length,
          blacklist: filteredVendors.value.filter(v => v.status === 'Blacklist').length,
          recent: sortedVendors.value.filter(v => v.formTimestamp).slice(0, 5)
        }));

        const combinedEmails = computed(() => {
            let all = [];
            broadcastResults.value.forEach(v => {
                if(v.email && v.email !== '-') {
                    let emails = v.email.replace(/[\n\r]+/g, ',').split(/[,;\s]+/).filter(e => e.includes('@'));
                    all.push(...emails);
                }
            });
            return [...new Set(all)].join(', ');
        });

        const handleLegalSort = (key) => {
          legalSortConfig.value.direction = legalSortConfig.value.key === key && legalSortConfig.value.direction === 'asc' ? 'desc' : 'asc';
          legalSortConfig.value.key = key;
        };

        const openDocModal = (vendor) => {
            selectedDocVendor.value = vendor;
            isDocModalOpen.value = true;
        };

        const resetFilters = () => {
           activeFilters.value = { aktif: true, nonAktif: true, blacklist: true };
           vendorLegalFilter.value = 'ALL';
        };

        const fetchLogs = async (silent = true) => {
           try {
              const data = await runGas('getLogsData');
              if (data && data.length > 0) logs.value = data;
           } catch(e) {}
        };

        const addLog = async (action, description) => {
            const newLog = { id: Date.now(), action, description, timestamp: Date.now(), user: loginForm.value.username || 'Admin' };
            logs.value.unshift(newLog);
            if(logs.value.length > 100) logs.value.pop();
            try { await runGas('saveLogData', newLog); } catch(e) {}
        };

        const handleLogin = async () => {
          loginLoading.value = true;
          loginError.value = '';
          try {
            const res = await runGas('loginUser', loginForm.value.username, loginForm.value.password);
            currentUser.value = res;
            isLoggedIn.value = true;
            setAuthStorage(res);
            fetchVendors(false);
            fetchLogs(true);
            loadAppSettings();
            if (!hasMenuAccess(activeTab.value)) activeTab.value = firstAccessibleMenu();
            resetInactivityTimer();
          } catch (e) {
            loginError.value = typeof e === 'string' ? e : 'Username atau password salah.';
          }
          loginLoading.value = false;
        };

        const handleLogout = () => {
          isLoggedIn.value = false;
          currentUser.value = null;
          setAuthStorage(null);
          if (inactivityTimer) clearTimeout(inactivityTimer); 
        };

        const resetInactivityTimer = () => {
          if (!isLoggedIn.value) return; 
          if (inactivityTimer) clearTimeout(inactivityTimer);
          inactivityTimer = setTimeout(() => {
            handleLogout(); 
            loginError.value = 'Sesi habis karena tidak aktif selama 30 menit. Silakan login kembali demi keamanan.';
            showToast("Sesi otomatis diakhiri.", "warning");
          }, 30 * 60 * 1000); 
        };

        const fetchVendors = async (silent = false) => {
          isSilentSync.value = silent;
          isSyncing.value = true;
          if (!silent) { loading.value = true; loadingText.value = 'Membaca database...'; }
          
          try {
            const data = await runGas('getVendorsData');
            const cleanData = [];

            data.forEach(v => {
                if(v.hp && String(v.hp).startsWith("'")) v.hp = String(v.hp).substring(1);
                if(v.phone && String(v.phone).startsWith("'")) v.phone = String(v.phone).substring(1);
                if(v.fax && String(v.fax).startsWith("'")) v.fax = String(v.fax).substring(1);
                
                let docsObj = {};
                try { docsObj = typeof v.documents === 'string' ? JSON.parse(v.documents) : v.documents; } catch(e) {}
                v.documents = docsObj;
                
                cleanData.push(v);
            });

            vendors.value = cleanData;
          } catch (err) {
            if (!silent) showToast("Gagal memuat data: " + (err.message || err), "error");
          } finally {
            isSyncing.value = false;
            if (!silent) { loading.value = false; loadingText.value = ''; }
          }
        };

        const loadAppSettings = async () => {
          try {
            const savedSet = await runGas('loadSettings');
            if (savedSet) settings.value = savedSet;
          } catch(e) { console.error('Gagal memuat pengaturan:', e); }
        };

        onMounted(async () => { 
          if (isLoggedIn.value) {
            fetchVendors(false); 
            fetchLogs(true);
            resetInactivityTimer(); 
            await loadAppSettings();
            loadReminderOverview();
          } else {
            loading.value = false;
          }

          setInterval(() => {
              if (isLoggedIn.value && !isModalOpen.value && !isBulkStatusModalOpen.value && selectedRows.value.size === 0 && !isDocModalOpen.value && activeTab.value !== 'pengaturan' && !isImporting.value) {
                  fetchVendors(true);
                  fetchLogs(true);
              }
          }, 15000); 

          const events = ['mousedown', 'mousemove', 'keydown', 'scroll', 'touchstart'];
          events.forEach(e => document.addEventListener(e, resetInactivityTimer));
        });

        const openConfirm = (options) => {
          confirmDialog.value = {
            isOpen: true, title: options.title || 'Konfirmasi', message: options.message || 'Apakah Anda yakin?', type: options.type || 'danger',
            confirmText: options.confirmText || 'Ya', cancelText: options.cancelText || 'Batal', onConfirm: options.onConfirm || null
          };
        };

        const closeConfirm = () => { confirmDialog.value.isOpen = false; };
        const executeConfirm = async () => { if (confirmDialog.value.onConfirm) await confirmDialog.value.onConfirm(); closeConfirm(); };

        const openBulkStatusModal = () => { bulkStatusValue.value = 'Aktif'; isBulkStatusModalOpen.value = true; };
        const closeBulkStatusModal = () => { isBulkStatusModalOpen.value = false; };

        const handleSort = (key) => {
          sortConfig.value.direction = sortConfig.value.key === key && sortConfig.value.direction === 'asc' ? 'desc' : 'asc';
          sortConfig.value.key = key;
        };

        const toggleRowSelection = (id) => {
          const newSet = new Set(selectedRows.value);
          newSet.has(id) ? newSet.delete(id) : newSet.add(id);
          selectedRows.value = newSet;
        };

        const toggleAllRows = () => {
          if (selectedRows.value.size === currentData.value.length) selectedRows.value = new Set();
          else selectedRows.value = new Set(currentData.value.map(v => v.id));
        };

        const openModal = (vendor = null) => {
          editingVendor.value = vendor;
          formData.value = vendor ? { ...vendor } : { status: 'Aktif', alamat: '-' };
          showSuggestions.value = false;
          showEmailSuggestions.value = false;
          isModalOpen.value = true;
        };
