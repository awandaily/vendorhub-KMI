                  merk: { status: (colMap.merk !== undefined && row[colMap.merk] ? String(row[colMap.merk]).trim() : 'TIDAK ADA'), link: '' },
                  distributor: extractDoc(colMap.dist, colMap.distLink),
                  negara: { status: (colMap.negara !== undefined && row[colMap.negara] ? String(row[colMap.negara]).trim() : 'TIDAK ADA'), link: '' },
                  iso9001: extractDoc(colMap.iso9001, colMap.iso9001Link),
                  iso45001: extractDoc(colMap.iso45001, colMap.iso45001Link),
                  iso14001: extractDoc(colMap.iso14001, colMap.iso14001Link),
                  iso22000: extractDoc(colMap.iso22000, colMap.iso22000Link),
                  fssc: extractDoc(colMap.fssc, colMap.fsscLink),
                  halal: extractDoc(colMap.halal, colMap.halalLink),
                  smk3: extractDoc(colMap.smk3, colMap.smk3Link),
                  kan: extractDoc(colMap.kan, colMap.kanLink),
                  ruangKan: { status: (colMap.ruangKan !== undefined && row[colMap.ruangKan] ? String(row[colMap.ruangKan]).trim() : 'TIDAK ADA'), link: '' },
                  instansi: extractDoc(colMap.instansi, colMap.instansiLink)
              };

              extracted.push({
                  perusahaan: rowPerusahaan, legalitas: rowLegalitas, pic: rowPic, sapaan: rowSapaan,
                  email: colMap.email !== undefined ? String(row[colMap.email] || '-') : '-',
                  phone: formattedPhone !== '-' ? "'" + formattedPhone : '-',
                  fax: formattedFax !== '-' ? "'" + formattedFax : '-',
                  hp: formattedHp !== '-' ? "'" + formattedHp : '-',
                  jabatan: colMap.jabatan !== undefined ? String(row[colMap.jabatan] || '-') : '-',
                  keterangan: rowKeterangan, produk: rowProduk, status: rawStatus, alamat: rowAlamat,
                  formTimestamp: rowTimestamp, 
                  documents: extractedDocs 
              });
            }
            return extracted;
        };

        const executeSmartMerge = async (newImportsArray) => {
            const itemsToProcessMap = new Map();
            const existingRecords = vendors.value.map(v => ({
                id: v.id, rowIndex: v.rowIndex, company: cleanCompanyName(v.perusahaan),
                pic: String(v.pic || '').toLowerCase().trim(), email: String(v.email || '').toLowerCase().trim()
            }));

            // FIX: hitung berapa kali tiap nama perusahaan muncul di database.
            // Jika sebuah perusahaan namanya UNIK (cuma 1 entri), kita anggap otomatis "sama"
            // walau PIC/email di form berbeda dari yang sudah diedit manual di web.
            // Ini mencegah data yang sudah diedit (misal ganti PIC) malah dibuatkan
            // entri BARU/duplikat hanya karena PIC di form masih nama lama.
            const companyOccurrence = {};
            existingRecords.forEach(ext => { companyOccurrence[ext.company] = (companyOccurrence[ext.company] || 0) + 1; });

            for (let v of newImportsArray) {
               let cleanComp = cleanCompanyName(v.perusahaan);
               let cleanPic = String(v.pic || '').toLowerCase().trim();
               let cleanEmail = String(v.email || '').toLowerCase().trim();
               if (!cleanComp) continue;

               let matchedExisting = existingRecords.find(ext => {
                   let isCompMatch = (ext.company === cleanComp);
                   if (!isCompMatch) return false;
                   // Nama perusahaan unik di database -> langsung anggap vendor yang sama
                   if (companyOccurrence[ext.company] === 1) return true;
                   let isPicMatch = (ext.pic !== '' && ext.pic !== '-' && ext.pic === cleanPic);
                   let isEmailMatch = (ext.email !== '' && ext.email !== '-' && ext.email === cleanEmail);
                   return isPicMatch || isEmailMatch;
               });

               if (matchedExisting) {
                   let targetVendor;
                   if (itemsToProcessMap.has(matchedExisting.id)) targetVendor = itemsToProcessMap.get(matchedExisting.id).payload;
                   else targetVendor = vendors.value.find(val => val.id === matchedExisting.id);
                   
                   let currentDocs = {};
                   try { currentDocs = typeof targetVendor.documents === 'string' ? JSON.parse(targetVendor.documents) : (targetVendor.documents || {}); } catch(e) {}

                   let newDocs = v.documents; let mergedDocs = { ...currentDocs };
                   for (let key in newDocs) {
                       if (newDocs[key] && newDocs[key].status !== 'TIDAK ADA' && newDocs[key].status !== '') mergedDocs[key] = newDocs[key];
                   }

                   let finalPayload = {
                       ...targetVendor, documents: mergedDocs, 
                       hp: targetVendor.hp === '-' && v.hp !== '-' ? v.hp : targetVendor.hp,
                       phone: targetVendor.phone === '-' && v.phone !== '-' ? v.phone : targetVendor.phone,
                       alamat: targetVendor.alamat === '-' && v.alamat !== '-' ? v.alamat : targetVendor.alamat,
                       produk: targetVendor.produk === '-' && v.produk !== '-' ? v.produk : targetVendor.produk
                   };
                   if(v.formTimestamp) finalPayload.formTimestamp = v.formTimestamp; 

                   itemsToProcessMap.set(matchedExisting.id, { action: 'update', payload: finalPayload });
               } else {
                   let matchedNewId = Array.from(itemsToProcessMap.keys()).find(id => {
                       let p = itemsToProcessMap.get(id).payload; return cleanCompanyName(p.perusahaan) === cleanComp;
                   });

                   if (matchedNewId) {
                       let targetVendor = itemsToProcessMap.get(matchedNewId).payload;
                       let currentDocs = targetVendor.documents || {};
                       let newDocs = v.documents; let mergedDocs = { ...currentDocs };
                       for (let key in newDocs) {
                           if (newDocs[key] && newDocs[key].status !== 'TIDAK ADA' && newDocs[key].status !== '') mergedDocs[key] = newDocs[key];
                       }

                       v.alamat = (v.alamat === '-' && targetVendor.alamat !== '-') ? targetVendor.alamat : v.alamat;
                       v.produk = (v.produk === '-' && targetVendor.produk !== '-') ? targetVendor.produk : v.produk;
                       targetVendor.alamat = (targetVendor.alamat === '-' && v.alamat !== '-') ? v.alamat : targetVendor.alamat;
                       targetVendor.produk = (targetVendor.produk === '-' && v.produk !== '-') ? v.produk : targetVendor.produk;
                       
                       let tempId = 'temp_' + Date.now() + Math.floor(Math.random() * 10000);
                       v.id = tempId; v.documents = mergedDocs; 
                       itemsToProcessMap.set(tempId, { action: 'create', payload: v });
                       targetVendor.documents = mergedDocs;
                   } else {
                       let tempId = 'temp_' + Date.now() + Math.floor(Math.random() * 10000);
                       v.id = tempId; itemsToProcessMap.set(tempId, { action: 'create', payload: v });
                   }
               }
            }

            const itemsToProcess = Array.from(itemsToProcessMap.values());
            if (itemsToProcess.length === 0) {
                showToast('Upload/Sync dibatalkan: File kosong atau format tidak dikenali.', 'warning');
                if (fileInputRef.value) fileInputRef.value.value = '';
                return;
            }

            isImporting.value = true;
            importTotal.value = itemsToProcess.length;
            importProgress.value = 0;
            if (activeTab.value !== 'pengaturan') activeTab.value = 'dokumen'; 
            if (fileInputRef.value) fileInputRef.value.value = ''; 

            if (importMode.value === 'replace') {
               const indexes = vendors.value.map(v => v.rowIndex);
               if(indexes.length > 0) {
                 await runGas('bulkDeleteVendors', indexes);
                 vendors.value = []; 
               }
            }

            let updateCount = 0; let createCount = 0;
            const BATCH_SIZE = 25; // FIX v12.93: kirim per-batch, bukan 1 request per baris

            for (let start = 0; start < itemsToProcess.length; start += BATCH_SIZE) {
                const chunk = itemsToProcess.slice(start, start + BATCH_SIZE);
                const batchPayload = chunk.map(item => {
                    const p = item.payload;
                    const savePayload = { ...p };
                    savePayload.documents = JSON.stringify(savePayload.documents || {});
                    if (!savePayload.formTimestamp) savePayload.formTimestamp = "";
                    return savePayload;
                });

                try {
                    const res = await runGas('bulkSaveVendorData', batchPayload);
                    createCount += (res && res.created) || 0;
                    updateCount += (res && res.updated) || 0;

                    chunk.forEach((item, i) => {
                        const p = item.payload;
                        const hpStr = String(p.hp || '-'); const tempHp = hpStr.startsWith("'") ? hpStr.substring(1) : hpStr;
                        const phoneStr = String(p.phone || '-'); const tempPhone = phoneStr.startsWith("'") ? phoneStr.substring(1) : phoneStr;
                        const faxStr = String(p.fax || '-'); const tempFax = faxStr.startsWith("'") ? faxStr.substring(1) : faxStr;

                        if (item.action === 'create') {
                            vendors.value.unshift({ id: 'temp_' + (start + i), ...p, hp: tempHp, phone: tempPhone, fax: tempFax, formTimestamp: p.formTimestamp || "" });
                        } else {
                            const idx = vendors.value.findIndex(val => val.id === p.id);
                            if (idx !== -1) vendors.value[idx] = { ...p, hp: tempHp, phone: tempPhone, fax: tempFax, documents: batchPayload[i].documents };
                        }
                    });
                } catch (errBatch) {
                    console.error(`Gagal menyimpan batch mulai baris ${start}:`, errBatch);
                    showToast(`Error pada batch ke-${Math.floor(start / BATCH_SIZE) + 1}: ${errBatch.message || errBatch}`, 'error');
                }

                importProgress.value = Math.min(start + BATCH_SIZE, itemsToProcess.length);
            }

            isImporting.value = false; 
            addLog('SYNC/IMPORT', `Smart Merge Selesai: ${createCount} Vendor Baru, ${updateCount} Diupdate.`);
            showToast(`Smart Merge Sukses! ${createCount} baru, ${updateCount} diupdate.`);
            await fetchVendors(false); 
        };

        const handleImportFile = async (event) => {
          const files = event.target.files;
          if (!files.length) return;
          try {
            let allParsedRows = [];
            for (let file of files) {
              const data = await file.arrayBuffer();
              const workbook = XLSX.read(data, { type: 'array', cellDates: true });
              workbook.SheetNames.forEach(sheetName => {
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1 });
                if (rows.length >= 2) allParsedRows.push(...parseRowsToImports(rows));
              });
            }
            if (importMode.value === 'replace') {
               openConfirm({
                  title: 'Peringatan: Timpa Data', message: 'Mode Replace akan menghapus SELURUH data lama di Google Sheets Anda sebelum memasukkan data baru. Yakin ingin melanjutkan?', type: 'warning', confirmText: 'Ya, Timpa Data',
                  onConfirm: () => { return executeSmartMerge(allParsedRows); }
               });
               if (fileInputRef.value) fileInputRef.value.value = ''; 
               return; 
            } else {
               executeSmartMerge(allParsedRows);
            }
          } catch (e) { showToast(e.message || 'Terjadi kesalahan sistem saat parsing Excel.', 'error'); if (fileInputRef.value) fileInputRef.value.value = ''; }
        };

        return {
          activeTab, vendors, loading, loadingText, isSilentSync, isSyncing, searchQuery, isModalOpen, editingVendor, formData, isSaving,
          selectedRows, currentPage, itemsPerPage, toast, isLoggedIn, loginForm, loginError, importMode, fileInputRef,
          isImporting, importProgress, importTotal, showSuggestions, companySuggestions, selectSuggestion,
          showEmailSuggestions, emailSuggestions, selectEmailSuggestion, duplicateEmailWarning, handleEnableAutoBackup, goToLegalDoc,
          currentUser, hasMenuAccess, loginLoading, MENU_ORDER, MENU_LABELS, accessData, expandedRole, isRoleFormOpen, roleForm,
          isUserFormOpen, userForm, openRoleForm, saveRoleForm, confirmDeleteRole, openUserForm, saveUserForm, confirmDeleteUser,
          isAllFiltersActive, activeFilters, isFilterOpen, resetFilters, vendorLegalFilter,
          isDocModalOpen, selectedDocVendor, openDocModal, docFields, getDocStatus, getDocLink, renderDocBadgeHTML, getComplianceScore,
          isBulkStatusModalOpen, bulkStatusValue, openBulkStatusModal, closeBulkStatusModal, handleBulkUpdateStatus,
          confirmDialog, closeConfirm, executeConfirm, settings, formHeaders, formatDateOnly, isUpdateValid, formatTimeAgo,
          handleFetchFormHeaders, saveAppConfig, handleSyncFromForm,
          reminderSettings, reminderOverview, isSendingReminder, isSendingSingleReminder,
          loadReminderConfig, loadReminderOverview, saveReminderConfig, handleSendBulkReminder, handleSendSingleReminder,
          handleLogin, handleLogout, fetchVendors, fetchLogs, sortConfig, filteredVendors, sortedVendors, totalPages, currentData, stats,
          handleSort, toggleRowSelection, toggleAllRows, openModal, handleSaveVendor, handleDelete, handleBulkDelete,
          uniqueLegalVendors, currentLegalData, legalTotalPages, legalDocFilter, legalSortConfig, handleLegalSort, legalCurrentPage, legalItemsPerPage,
          isResigned, isBlacklisted, isPO, displayKeterangan, canContact, getBadgeColor, getRowClass, formatWhatsAppLink,
          cleanCompanyName, guessSapaan, formatIndonesianPhone,
          handleCopyEmail, openWhatsApp, openEmail, handleExportExcel, handleImportFile,
          broadcastInput, broadcastResults, broadcastNotFound, combinedEmails, processBroadcast, copyBroadcastEmails, copySelectedEmails,
          logs, addLog, expandedGroups, toggleExpand
        };
      }
    }).mount('#app');
  </script>
</body>
